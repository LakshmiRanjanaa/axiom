name: AXIOM Daily Run

on:
  # Runs every day at 8:00 AM IST (2:30 AM UTC)
  schedule:
    - cron: '30 2 * * *'

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-axiom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AXIOM Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.AXIOM_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          YOUR_WHATSAPP_NUMBER: ${{ secrets.YOUR_WHATSAPP_NUMBER }}
        run: python main.py
